<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YAMI MASK — Caçada das Sombras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="particles-container"></div>

  <div id="screen-start" class="screen active">
    <div class="start-inner">
      <p class="subtitle">⛩ CAÇADA DAS SOMBRAS ⛩</p>
      <h1>YAMI<br><span>MASK</span></h1>
      <p class="description">
        A máscara aparece… e desaparece.<br>
        Clique nela antes que as sombras a engulam.<br>
        Você tem entre <strong>10 e 20 segundos</strong>.
      </p>
      <button id="btn-start">▶ INICIAR JOGO</button>
    </div>
  </div>

  <div id="screen-game" class="screen">
    <div id="hud">
      <div id="hud-score">
        <span class="hud-label">PONTOS</span>
        <span id="score-display">0</span>
      </div>
      <div id="hud-timer">
        <span class="hud-label">TEMPO</span>
        <span id="timer-display">--</span>
      </div>
    </div>
    <div id="game-area"></div>
  </div>

  <div id="screen-end" class="screen">
    <div class="end-inner">
      <p class="end-label">FIM DA CAÇADA</p>
      <h2 id="final-score-text">0 <span>pontos</span></h2>
      <p id="final-message"></p>
      <button id="btn-restart">↺ JOGAR NOVAMENTE</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
